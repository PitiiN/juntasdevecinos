<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell Component) -->
<header class="sticky top-0 z-50 px-6 py-4 flex items-center justify-between bg-surface-bright/80 backdrop-blur-md">

</div>

<main class="flex-grow px-6 pt-4 pb-32">
<!-- Voucher Container -->
<div class="max-w-md mx-auto">
<!-- Branding Header -->
<div class="mb-8 flex flex-col items-center text-center">
<div class="w-12 h-12 bg-primary rounded-xl mb-4 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<p class="font-headline font-extrabold text-primary tracking-tight">ORGANIZACIÓN XXX</p>
<p class="text-sm text-on-surface-variant font-medium">ORGANIZACIÓN XXX</p>
</div>
<!-- The Digital Document -->
<div class="bg-surface-container-lowest rounded-xl p-8 relative overflow-hidden">
<!-- Tonal Depth Background Decoration -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/20 rounded-bl-[100px] -z-0"></div>
<div class="relative z-10">
<!-- Document Header -->
<div class="flex justify-between items-start mb-10">
<div>
<p class="text-xs font-bold text-primary-container/60 mb-1">COMPROBANTE OFICIAL</p>
<h2 class="font-headline text-2xl font-bold text-primary">Recibo de Pago</h2>
</div>
<div class="text-right">
<p class="text-xs text-on-surface-variant mb-1">N° Documento</p>
<p class="font-headline font-bold text-primary">CF-98234-2024</p>
</div>
</div>
<!-- Details Bento Grid -->
<div class="grid grid-cols-1 gap-6 mb-10">
<div class="grid grid-cols-2 gap-4">
<div class="p-4 bg-surface-container-low rounded-lg">
<p class="text-xs font-semibold text-on-surface-variant mb-1">Fecha de emisión</p>
<p class="text-sm font-bold text-on-surface">24 Oct, 2023</p>
</div>
<div class="p-4 bg-surface-container-low rounded-lg">
<p class="text-xs font-semibold text-on-surface-variant mb-1">Monto Total</p>
<p class="text-sm font-bold text-primary">$45.00 USD</p>
</div>
</div>
</div>
<!-- Seal / Stamp Area -->
<div class="flex flex-col items-center py-8 border-2 border-dashed border-outline-variant/30 rounded-xl mb-8">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex flex-col items-center justify-center text-center p-4">
<span class="material-symbols-outlined text-outline text-3xl mb-1">verified_user</span>
<span class="text-[8px] font-bold text-outline leading-tight">ESPACIO PARA<br/>EL TIMBRE</span>
</div>
<p class="mt-4 text-[10px] text-on-surface-variant/70 italic text-center px-4">ORGANIZACIÓN XXX</p>
</div>
<!-- Footer Data -->
</div>
</div>
<!-- Actions -->
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-gradient-to-r from-primary to-primary-container text-white py-4 rounded-lg font-semibold hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-lg">download</span>
<span>Download PDF</span>
</button>
<button class="flex items-center justify-center gap-2 bg-secondary-container text-on-secondary-fixed-variant py-4 rounded-lg font-semibold hover:bg-secondary-fixed transition-colors">
<span class="material-symbols-outlined text-lg">share</span>
<span>Share</span>
</button>
</div>
<button class="w-full mt-4 flex items-center justify-center gap-2 text-on-surface-variant py-2 text-sm font-medium">
<span class="material-symbols-outlined text-lg">report</span>
<span>¿Hay un error en este recibo?</span>
</button>
